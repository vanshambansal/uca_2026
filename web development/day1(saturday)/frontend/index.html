<!-- 

defer tells the browser:

Download the JS now, but execute it only after the entire HTML has been parsed.


or put script at then end 


When you use <script src="example.js" async></script>, the file downloads in parallel with the HTML parsing and executes immediately once downloaded, briefly pausing the HTML parser during execution.

-->
